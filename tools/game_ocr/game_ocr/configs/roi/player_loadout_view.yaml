screen_type: player_loadout_view
expected_width: 1920
expected_height: 1080
# Anchor-based parsing on full-frame OCR. The previous fragmented ROIs were
# catastrophically misaligned (gamertag pointed at the LEFT-STRIP avatar
# instead of top-right; build_class clipped half the title text; attribute
# ROIs captured 1 of 5 rows). See docs/ocr/pre-game-extraction-research.md
# for the structural diagnosis. New parser does full-frame OCR once, then
# locates fields by global y/x bands anchored on stable column headers.
regions:
  full_frame:
    x: 0.0
    y: 0.0
    width: 1.0
    height: 1.0
    preprocess: none

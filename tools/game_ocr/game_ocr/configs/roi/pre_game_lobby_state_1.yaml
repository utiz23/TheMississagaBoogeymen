screen_type: pre_game_lobby_state_1
expected_width: 1920
expected_height: 1080
# Anchor-based parsing on full-frame OCR. The previous panel-sized ROIs
# fragmented the row layout and the parser couldn't reliably split players.
# Now the parser uses position-label lines (C/LW/RW/LD/RD/G at panel edges)
# as row anchors. See docs/ocr/pre-game-extraction-research.md.
#
# Note: state_1 / state_2 share the same YAML — the parser auto-detects which
# state each team is in via `#NN` regex count. Two YAML names are kept so the
# extractor's screen registry stays explicit about which kind of capture the
# operator labelled.
regions:
  full_frame:
    x: 0.0
    y: 0.0
    width: 1.0
    height: 1.0
    preprocess: none
